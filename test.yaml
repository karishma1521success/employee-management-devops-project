apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: developer-role
  namespace: dev
  labels:
    environment: development
    team: development-team

rules:

- apiGroups: [""]
  resources:
    - pods
    - services
    - configmaps
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: [""]
  resources:
    - pods/log
  verbs:
    - get

- apiGroups: [""]
  resources:
    - persistentvolumeclaims
  verbs:
    - get
    - list

- apiGroups: ["apps"]
  resources:
    - deployments
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete

- apiGroups: ["apps"]
  resources:
    - replicasets
  verbs:
    - get
    - list

- apiGroups: ["batch"]
  resources:
    - jobs
    - cronjobs
  verbs:    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
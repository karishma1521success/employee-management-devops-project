---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: qa-rolebinding
  namespace: qa
  labels:
    environment: testing
    team: qa-team

subjects:
  # providing the access to the service account in the qa namespace
  - kind: ServiceAccount
    name: qa-sa
    namespace: qa

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: qa-role
